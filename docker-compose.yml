services:
  seer-backend:
    build:
      context: ./seer-backend
      dockerfile: Dockerfile
    container_name: seer-backend
    ports:
      - "${SEER_BACKEND_PORT:-8000}:8000"
    environment:
      SEER_APP_ENV: local
      SEER_LOG_LEVEL: INFO
      SEER_FUSEKI_HOST: fuseki
      SEER_FUSEKI_PORT: 3030
      SEER_FUSEKI_USERNAME: admin
      SEER_FUSEKI_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-admin}
      SEER_CLICKHOUSE_HOST: clickhouse
      SEER_CLICKHOUSE_PORT: 8123
      SEER_ACTIONS_DB_DSN: ${SEER_ACTIONS_DB_DSN:-postgresql+psycopg://seer:seer@postgres:5432/seer_actions}
      SEER_ACTIONS_DB_POOL_SIZE: ${SEER_ACTIONS_DB_POOL_SIZE:-5}
      SEER_ACTIONS_DB_MAX_OVERFLOW: ${SEER_ACTIONS_DB_MAX_OVERFLOW:-10}
      SEER_ACTIONS_DB_MIGRATIONS_DIR: ${SEER_ACTIONS_DB_MIGRATIONS_DIR:-migrations/postgres}
      SEER_ACTIONS_LEASE_SECONDS: ${SEER_ACTIONS_LEASE_SECONDS:-60}
      SEER_ACTIONS_HEARTBEAT_SECONDS: ${SEER_ACTIONS_HEARTBEAT_SECONDS:-20}
      SEER_ACTIONS_STALE_INSTANCE_SECONDS: ${SEER_ACTIONS_STALE_INSTANCE_SECONDS:-90}
      SEER_ACTIONS_SWEEPER_INTERVAL_SECONDS: ${SEER_ACTIONS_SWEEPER_INTERVAL_SECONDS:-20}
      SEER_ACTIONS_SCHEMA_BOOTSTRAP_ON_STARTUP: "true"
      SEER_PROPHET_METAMODEL_PATH: /prophet/prophet.ttl
      SEER_OPENAI_BASE_URL: ${SEER_OPENAI_BASE_URL:-http://host.docker.internal:8787/v1}
      SEER_OPENAI_MODEL: ${SEER_OPENAI_MODEL:-gemini-3-flash-preview}
      SEER_OPENAI_API_KEY: ${SEER_OPENAI_API_KEY:-}
    volumes:
      - ./prophet:/prophet:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - fuseki
      - clickhouse
      - postgres

  seer-actions-sweeper:
    build:
      context: ./seer-backend
      dockerfile: Dockerfile
    container_name: seer-actions-sweeper
    command: ["seer-actions-maintenance"]
    environment:
      SEER_APP_ENV: local
      SEER_LOG_LEVEL: INFO
      SEER_ACTIONS_DB_DSN: ${SEER_ACTIONS_DB_DSN:-postgresql+psycopg://seer:seer@postgres:5432/seer_actions}
      SEER_ACTIONS_DB_POOL_SIZE: ${SEER_ACTIONS_DB_POOL_SIZE:-5}
      SEER_ACTIONS_DB_MAX_OVERFLOW: ${SEER_ACTIONS_DB_MAX_OVERFLOW:-10}
      SEER_ACTIONS_DB_MIGRATIONS_DIR: ${SEER_ACTIONS_DB_MIGRATIONS_DIR:-migrations/postgres}
      SEER_ACTIONS_SWEEPER_ENABLED: ${SEER_ACTIONS_SWEEPER_ENABLED:-true}
      SEER_ACTIONS_SWEEPER_INTERVAL_SECONDS: ${SEER_ACTIONS_SWEEPER_INTERVAL_SECONDS:-20}
      SEER_ACTIONS_SWEEPER_BATCH_SIZE: ${SEER_ACTIONS_SWEEPER_BATCH_SIZE:-100}
      SEER_ACTIONS_SWEEPER_ADVISORY_LOCK_ID: ${SEER_ACTIONS_SWEEPER_ADVISORY_LOCK_ID:-104729}
      SEER_ACTIONS_SWEEPER_RETRY_DELAY_SECONDS: ${SEER_ACTIONS_SWEEPER_RETRY_DELAY_SECONDS:-2}
    depends_on:
      - postgres

  seer-ui:
    build:
      context: ./seer-ui
      dockerfile: Dockerfile
    container_name: seer-ui
    ports:
      - "${SEER_UI_PORT:-3000}:3000"
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${SEER_BACKEND_PORT:-8000}
      SEER_BACKEND_INTERNAL_URL: http://seer-backend:8000
    depends_on:
      - seer-backend

  fuseki:
    image: stain/jena-fuseki:5.1.0
    container_name: seer-fuseki
    ports:
      - "${SEER_FUSEKI_PORT:-3030}:3030"
    environment:
      ADMIN_PASSWORD: ${FUSEKI_ADMIN_PASSWORD:-admin}
      FUSEKI_DATASET_1: ds
    volumes:
      - fuseki-data:/fuseki

  clickhouse:
    image: clickhouse/clickhouse-server:24.8-alpine
    container_name: seer-clickhouse
    ports:
      - "${SEER_CLICKHOUSE_HTTP_PORT:-8123}:8123"
      - "${SEER_CLICKHOUSE_NATIVE_PORT:-9000}:9000"
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-seer}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-seer}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-seer}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  postgres:
    image: postgres:16-alpine
    container_name: seer-postgres
    ports:
      - "${SEER_ACTIONS_DB_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${SEER_ACTIONS_POSTGRES_DB:-seer_actions}
      POSTGRES_USER: ${SEER_ACTIONS_POSTGRES_USER:-seer}
      POSTGRES_PASSWORD: ${SEER_ACTIONS_POSTGRES_PASSWORD:-seer}
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  fuseki-data:
  clickhouse-data:
  postgres-data:
